<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trading Journal Pro+</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* Glow effect */
body::before{
  content:"";
  position:fixed;
  width:300px;
  height:300px;
  background:radial-gradient(circle, rgba(34,197,94,0.3), transparent 60%);
  pointer-events:none;
  transform:translate(-50%,-50%);
}

.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:#0f172a;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.small-form input, .small-form select{
  padding:5px;
  font-size:12px;
}

.grid{
  display:grid;
  gap:15px;
}

.grid-2{
  grid-template-columns:1fr 1fr;
}

canvas{
  background:#020617;
  border-radius:10px;
}
</style>
</head>

<body>
<div class="container">

<h2>📊 Trading Dashboard</h2>

<div class="grid grid-2">

<!-- Small Form -->
<div class="card small-form">
<h4>Add Trade</h4>
<select id="type"><option>Long</option><option>Short</option></select>
<select id="instrument"><option>NQ</option><option>ES</option><option>GC</option></select>
<input id="entry" placeholder="Entry">
<input id="exit" placeholder="Exit">
<input id="lots" placeholder="Lots">
<input id="date" type="date">
<button onclick="addTrade()" style="margin-top:5px;">Add</button>
</div>

<!-- Stats -->
<div class="card">
<h4>Stats</h4>
<div id="stats"></div>
</div>

</div>

<!-- Charts -->
<div class="grid" style="margin-top:20px;">

<div class="card">
<h4>Equity Curve</h4>
<canvas id="equityChart"></canvas>
</div>

<div class="card">
<h4>PnL Distribution</h4>
<canvas id="histogram"></canvas>
</div>

<div class="card">
<h4>Daily PnL</h4>
<canvas id="dailyChart"></canvas>
</div>

</div>

</div>

<script>

// Cursor glow follow
const glow=document.body;
document.addEventListener('mousemove',e=>{
  glow.style.setProperty('--x',e.clientX+'px');
  glow.style.setProperty('--y',e.clientY+'px');
  document.body.style.background=`radial-gradient(circle at ${e.clientX}px ${e.clientY}px, #0f172a, #020617)`;
});

let trades=JSON.parse(localStorage.getItem("trades")||"[]");

function pnl(t){
  return (t.type==='Long'?t.exit-t.entry:t.entry-t.exit)*t.lots;
}

function addTrade(){
  const t={
    type:type.value,
    instrument:instrument.value,
    entry:+entry.value,
    exit:+exit.value,
    lots:+lots.value,
    date:date.value
  };
  if(!t.entry||!t.exit||!t.lots||!t.date) return;
  trades.push(t);
  localStorage.setItem("trades",JSON.stringify(trades));
  render();
}

function stats(){
  const arr=trades.map(pnl);
  const wins=arr.filter(x=>x>0);
  const losses=arr.filter(x=>x<0);

  const total=arr.reduce((a,b)=>a+b,0);
  const winRate=arr.length?(wins.length/arr.length)*100:0;
  const avgWin=wins.length?wins.reduce((a,b)=>a+b,0)/wins.length:0;
  const avgLoss=losses.length?losses.reduce((a,b)=>a+b,0)/losses.length:0;

  const mean=total/(arr.length||1);
  const std=Math.sqrt(arr.reduce((a,b)=>a+(b-mean)**2,0)/(arr.length||1));
  const sharpe=std?mean/std:0;

  return {total,winRate,avgWin,avgLoss,sharpe};
}

function equity(){
  let c=0;
  return trades.map((t,i)=>{
    c+=pnl(t);
    return {x:i+1,y:c};
  });
}

function daily(){
  const m={};
  trades.forEach(t=>{
    m[t.date]=(m[t.date]||0)+pnl(t);
  });
  return Object.entries(m).map(([d,v])=>({x:d,y:v}));
}

let c1,c2,c3;

function draw(){
  if(c1) c1.destroy();
  const e=equity();
  c1=new Chart(equityChart,{type:'line',data:{labels:e.map(x=>x.x),datasets:[{data:e.map(x=>x.y), borderWidth:2}]}});

  if(c2) c2.destroy();
  const p=trades.map(pnl);
  c2=new Chart(histogram,{type:'bar',data:{labels:p,datasets:[{data:p}]}});

  if(c3) c3.destroy();
  const d=daily();
  c3=new Chart(dailyChart,{type:'bar',data:{labels:d.map(x=>x.x),datasets:[{data:d.map(x=>x.y)}]}});
}

function render(){
  const s=stats();
  stats.innerHTML=`
  Total: ${s.total.toFixed(2)}<br>
  Win Rate: ${s.winRate.toFixed(1)}%<br>
  Sharpe: ${s.sharpe.toFixed(2)}<br>
  Avg Win: ${s.avgWin.toFixed(2)}<br>
  Avg Loss: ${s.avgLoss.toFixed(2)}
  `;
  draw();
}

render();
</script>

</body>
</html>
