<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trading Journal Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

h2{margin-bottom:20px;}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* Small square input box */
.small-box{
  width:220px;
  height:230px;
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.small-box input, .small-box select{
  font-size:12px;
  padding:4px;
  border-radius:5px;
  border:none;
}

button{
  padding:6px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:black;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
}

canvas{
  background:#020617;
  border-radius:10px;
  box-shadow: 0px 10px 30px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<h2>📊 Trading Journal</h2>

<div class="grid">

<!-- Add Trade -->
<div class="small-box">
  <b>Add Trade</b>
  <select id="type"><option>Long</option><option>Short</option></select>
  <select id="instrument"><option>NQ</option><option>ES</option><option>GC</option></select>
  <input id="entry" placeholder="Entry">
  <input id="exit" placeholder="Exit">
  <input id="lots" placeholder="Lots">
  <input id="date" type="date">
  <button onclick="addTrade()">Add</button>
</div>

<!-- Stats -->
<div class="card">
  <h4>Stats</h4>
  <div id="stats"></div>
</div>

</div>

<!-- Charts -->
<div class="grid" style="margin-top:30px;">

<div class="card">
  <h4>Equity Curve</h4>
  <canvas id="equityChart"></canvas>
</div>

<div class="card">
  <h4>PnL Distribution</h4>
  <canvas id="histogram"></canvas>
</div>

<div class="card">
  <h4>Daily PnL</h4>
  <canvas id="dailyChart"></canvas>
</div>

</div>

<!-- Last 5 Trades -->
<div class="card" style="margin-top:30px;">
  <h4>Last 5 Trades</h4>
  <div id="trades"></div>
</div>

<script>
let trades = JSON.parse(localStorage.getItem("trades") || "[]");

function calculatePnL(t){
  return (t.type==="Long"? t.exit-t.entry : t.entry-t.exit) * t.lots;
}

function addTrade(){
  const t={
    type:type.value,
    instrument:instrument.value,
    entry:+entry.value,
    exit:+exit.value,
    lots:+lots.value,
    date:date.value
  };
  if(!t.entry||!t.exit||!t.lots||!t.date) return;
  trades.push(t);
  localStorage.setItem("trades",JSON.stringify(trades));
  render();
}

function stats(){
  const arr=trades.map(calculatePnL);
  const wins=arr.filter(x=>x>0);
  const losses=arr.filter(x=>x<0);

  const total=arr.reduce((a,b)=>a+b,0);
  const winRate=arr.length?(wins.length/arr.length)*100:0;

  const avgWin=wins.length?wins.reduce((a,b)=>a+b,0)/wins.length:0;
  const avgLoss=losses.length?losses.reduce((a,b)=>a+b,0)/losses.length:0;

  const rr = avgLoss !== 0 ? Math.abs(avgWin/avgLoss) : 0;

  const mean=total/(arr.length||1);
  const std=Math.sqrt(arr.reduce((a,b)=>a+(b-mean)**2,0)/(arr.length||1));
  const sharpe=std?mean/std:0;

  const profitFactor = Math.abs(
    (wins.reduce((a,b)=>a+b,0)) / (losses.reduce((a,b)=>a+b,0) || 1)
  );

  return {
    total,
    winRate,
    avgWin,
    avgLoss,
    rr,
    sharpe,
    profitFactor,
    trades: arr.length
  };
}

function equity(){
  let c=0;
  return trades.map((t,i)=>{c+=calculatePnL(t); return {x:i+1,y:c};});
}

function daily(){
  const m={};
  trades.forEach(t=>{
    m[t.date]=(m[t.date]||0)+calculatePnL(t);
  });
  return Object.entries(m).map(([d,v])=>({x:d,y:v}));
}

let c1,c2,c3;

function draw(){
  if(c1) c1.destroy();
  const e=equity();
  c1=new Chart(equityChart,{
    type:'line',
    data:{
      labels:e.map(x=>x.x),
      datasets:[{
        data:e.map(x=>x.y),
        borderWidth:3,
        tension:0.3
      }]
    }
  });

  if(c2) c2.destroy();
  const p=trades.map(calculatePnL);
  c2=new Chart(histogram,{
    type:'bar',
    data:{
      labels:p,
      datasets:[{data:p}]
    }
  });

  if(c3) c3.destroy();
  const d=daily();
  c3=new Chart(dailyChart,{
    type:'bar',
    data:{
      labels:d.map(x=>x.x),
      datasets:[{data:d.map(x=>x.y)}]
    }
  });
}

function render(){
  const s=stats();

  document.getElementById("stats").innerHTML = `
  <b>Total Trades:</b> ${s.trades}<br>
  <b>Total PnL:</b> ${s.total.toFixed(2)}<br>
  <b>Win Rate:</b> ${s.winRate.toFixed(1)}%<br>
  <b>Risk-Reward:</b> ${s.rr.toFixed(2)}<br>
  <b>Sharpe Ratio:</b> ${s.sharpe.toFixed(2)}<br>
  <b>Profit Factor:</b> ${s.profitFactor.toFixed(2)}<br>
  <b>Avg Win:</b> ${s.avgWin.toFixed(2)}<br>
  <b>Avg Loss:</b> ${s.avgLoss.toFixed(2)}
  `;

  const last5 = trades.slice(-5).reverse();

  const tradesDiv=document.getElementById("trades");
  tradesDiv.innerHTML="";

  last5.forEach(t=>{
    const pnl=calculatePnL(t);
    tradesDiv.innerHTML+=`
    <div style="border-bottom:1px solid gray; padding:8px;">
      ${t.date} | ${t.instrument} | ${t.type} |
      <span style="color:${pnl>=0?'#22c55e':'#ef4444'}">${pnl.toFixed(2)}</span>
    </div>`;
  });

  draw();
}

const equityChart=document.getElementById('equityChart');
const histogram=document.getElementById('histogram');
const dailyChart=document.getElementById('dailyChart');

render();
</script>

</body>
</html>
